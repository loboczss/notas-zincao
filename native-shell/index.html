<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notas Zincao</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        text-align: center;
      }

      img {
        width: 7rem;
        height: auto;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logomarca.png" alt="Notas Zincao">
      <h1>Configure a URL da VPS</h1>
      <p>Defina CAPACITOR_SERVER_URL com uma URL HTTPS e rode npm run android:sync.</p>
    </main>
  </body>
</html>
